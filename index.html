```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🛒 Ramu Kiranam - Milk Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
font-family:"Poppins","Segoe UI",sans-serif;
background:linear-gradient(135deg,#eef2f3,#dfe9f3);
margin:0;
padding:18px;
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
font-size:32px;
color:#1a237e;
margin-bottom:5px;
}

.header div{
font-size:18px;
color:#37474f;
}

.card{
background:#fff;
border-radius:18px;
padding:18px;
margin-bottom:18px;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:12px;
}

input{
padding:8px;
font-size:15px;
border-radius:8px;
border:1px solid #ccc;
}

input[type="number"]{
width:70px;
text-align:center;
}

button{
width:100%;
padding:14px;
font-size:17px;
margin-bottom:12px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#1976d2,#0d47a1);
color:#fff;
font-weight:bold;
cursor:pointer;
}

.amount-box{
font-size:18px;
font-weight:bold;
color:#fff;
background:linear-gradient(135deg,#43a047,#1b5e20);
padding:6px 10px;
border-radius:10px;
min-width:80px;
text-align:center;
}

.grand-total{
background:linear-gradient(135deg,#ff6f00,#e65100);
color:#fff;
padding:22px;
border-radius:18px;
text-align:center;
font-size:24px;
font-weight:bold;
margin-top:25px;
}

#loginBox{
max-width:350px;
margin:120px auto;
text-align:center;
}

#mainContent{display:none;}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:999;
}

.popupBox{
background:white;
padding:25px;
border-radius:15px;
text-align:center;
width:85%;
max-width:320px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="card">
<h2>🔐 Admin Access</h2>
<input type="password" id="password" placeholder="Enter Password"><br><br>
<button onclick="checkPassword()">Login</button>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent">

<div class="header">
<h1>🛒 Ramu Kiranam 🥛</h1>
<div>Daily Milk Purchase Calculator</div>
</div>

<div class="card">
Date:
<input type="date" id="entryDate">
</div>

<button id="saveBtn">💾 Save Entry</button>
<button id="loadBtn">📂 Load Saved Data</button>

<div id="products"></div>

<div class="card">
Oil Minus
<input type="number" id="oilMinus" placeholder="Amount">
</div>

<div class="card">
Rice Minus
<input type="number" id="riceMinus" placeholder="Amount">
</div>

<div class="grand-total">
Total ₹ <span id="grandTotal">0</span>
</div>

<button onclick="makePayment()">💳 MAKE PAYMENT</button>

<button onclick="markPaid()" style="background:#2e7d32">
✔ PAYMENT DONE
</button>

</div>

<!-- POPUP -->
<div id="paymentPopup" class="popup">

<div class="popupBox">

<h2 style="color:#2e7d32">Payment Completed</h2>

<button onclick="closePopup()" style="background:#777">
Close
</button>

</div>

</div>

<script>

const ADMIN_PASSWORD="1234";

function checkPassword(){

let entered=document.getElementById("password").value;

if(entered===ADMIN_PASSWORD){

document.getElementById("loginBox").style.display="none";
document.getElementById("mainContent").style.display="block";

}
else{

alert("Wrong Password");

}

}

const firebaseConfig={
apiKey:"AIzaSyDuT-uXEbATKcPd3Smk1oysNih_lplFCwo",
authDomain:"ramu-kiranam-milk.firebaseapp.com",
projectId:"ramu-kiranam-milk"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();

document.getElementById("entryDate").value=
new Date().toISOString().split("T")[0];

const products=[
{name:"Thirumala Gold 500ml",price:37},
{name:"Mulkanoor Gold 500ml",price:35.5},
{name:"Thirumala & Mulkanoor Plain 500ml",price:27},
{name:"Mulkanoor Gold 200ml",price:13},
{name:"Curd 1kg",price:48},
{name:"Sangam Curd 500gm",price:28},
{name:"Mukunda Curd 500gm",price:24},
{name:"Curd 175gm",price:8}
];

const container=document.getElementById("products");

products.forEach(product=>{

const card=document.createElement("div");

card.className="card";

card.innerHTML=`
<strong>${product.name}</strong><br>
Price: ₹${product.price}

<div class="row">
Qty
<input type="number" min="0" data-price="${product.price}" placeholder="">

<div class="amount-box">
₹ <span class="itemTotal">0</span>
</div>
</div>
`;

container.appendChild(card);

});

function calculate(){

let total=0;

document.querySelectorAll("#products .card").forEach(card=>{

let input=card.querySelector("input");

let qty=Number(input.value)||0;

let price=input.dataset.price;

let amount=qty*price;

card.querySelector(".itemTotal").innerText=amount;

total+=amount;

});

let oil=Number(document.getElementById("oilMinus").value)||0;
let rice=Number(document.getElementById("riceMinus").value)||0;

total=total-oil-rice;

if(total<0) total=0;

document.getElementById("grandTotal").innerText=total;

}

document.addEventListener("input",calculate);

document.getElementById("saveBtn").onclick=async function(){

let date=document.getElementById("entryDate").value;

let items=[];
let total=0;

document.querySelectorAll("#products .card").forEach((card,i)=>{

let qty=Number(card.querySelector("input").value)||0;

if(qty>0){

let price=products[i].price;

let amount=qty*price;

items.push({name:products[i].name,qty,price});

total+=amount;

}

});

let oilMinus=Number(document.getElementById("oilMinus").value)||0;
let riceMinus=Number(document.getElementById("riceMinus").value)||0;

await db.collection("milkEntries").doc(date).set({
date,
items,
oilMinus,
riceMinus,
total:total-oilMinus-riceMinus
});

alert("Saved");

};

document.getElementById("loadBtn").onclick=async function(){

let date=document.getElementById("entryDate").value;

let snap=await db.collection("milkEntries").doc(date).get();

if(!snap.exists){

alert("No Data Found");

return;

}

let data=snap.data();

document.querySelectorAll("#products input").forEach(i=>i.value="");

data.items.forEach(item=>{

products.forEach((p,index)=>{

if(p.name===item.name){

document.querySelectorAll("#products input")[index].value=item.qty;

}

});

});

document.getElementById("oilMinus").value=data.oilMinus||"";
document.getElementById("riceMinus").value=data.riceMinus||"";

calculate();

};

function makePayment(){

let amount=document.getElementById("grandTotal").innerText;

let upi="mulkasampath@okaxis";

let link=`upi://pay?pa=${upi}&pn=Mulka Sampath&am=${amount}&cu=INR`;

window.location.href=link;

}

function markPaid(){

document.getElementById("paymentPopup").style.display="flex";

}

function closePopup(){

document.getElementById("paymentPopup").style.display="none";

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🛒 Ramu Kiranam - Milk Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
font-family:"Poppins","Segoe UI",sans-serif;
background:linear-gradient(135deg,#eef2f3,#dfe9f3);
margin:0;
padding:18px;
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
font-size:32px;
color:#1a237e;
}

.card{
background:#fff;
border-radius:18px;
padding:18px;
margin-bottom:18px;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:12px;
}

input{
padding:8px;
font-size:15px;
border-radius:8px;
border:1px solid #ccc;
}

input[type="number"]{
width:70px;
text-align:center;
}

button{
width:100%;
padding:14px;
font-size:17px;
margin-bottom:12px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#1976d2,#0d47a1);
color:#fff;
font-weight:bold;
cursor:pointer;
}

.amount-box{
font-size:18px;
font-weight:bold;
color:#fff;
background:linear-gradient(135deg,#43a047,#1b5e20);
padding:6px 10px;
border-radius:10px;
min-width:80px;
text-align:center;
}

.grand-total{
background:linear-gradient(135deg,#ff6f00,#e65100);
color:#fff;
padding:22px;
border-radius:18px;
text-align:center;
font-size:24px;
font-weight:bold;
margin-top:25px;
}

#mainContent{display:none;}

#loginBox{
max-width:350px;
margin:120px auto;
text-align:center;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
background:white;
padding:25px;
border-radius:15px;
text-align:center;
width:90%;
max-width:350px;
}

</style>
</head>

<body>

<div id="loginBox" class="card">
<h2>🔐 Admin Access</h2>
<input type="password" id="password" placeholder="Enter Password"><br><br>
<button onclick="checkPassword()">Login</button>
</div>

<div id="mainContent">

<div class="header">
<h1>🛒 Ramu Kiranam 🥛</h1>
<div>📊 Daily Milk Purchase Calculator</div>
</div>

<div class="card">
📅 Date:
<input type="date" id="entryDate">
</div>

<button id="saveBtn">💾 Save Today’s Entry</button>
<button id="loadBtn">📂 Load Selected Date</button>

<div id="products"></div>

<div class="card">
🛢️ Oil Tin Minus:
<input type="number" id="oilMinus" placeholder="Amount">
</div>

<div class="card">
🍚 Rice Amount Minus:
<input type="number" id="riceMinus" placeholder="Amount">
</div>

<div class="grand-total">
💰 Total Amount: ₹<span id="grandTotal">0</span>
</div>

<div class="card" style="text-align:center">

<button onclick="makePayment()" style="background:#ff1744;font-size:20px;">
💳 MAKE PAYMENT
</button>

<button onclick="markPaid()" style="background:#2e7d32;font-size:18px;">
✔ PAYMENT DONE
</button>

</div>

</div>


<div id="paymentPopup" class="popup">

<div class="popup-box">

<h2 style="color:#2e7d32;">✅ Payment Completed</h2>

<p>Send milk bill to supplier WhatsApp?</p>

<button onclick="sendBillWhatsApp()" style="background:#25D366;">
📤 Send Bill to WhatsApp
</button>

<button onclick="closePopup()" style="background:#777;">
Close
</button>

</div>

</div>


<script>

const ADMIN_PASSWORD="1234";

function checkPassword(){

let entered=document.getElementById("password").value;

if(entered===ADMIN_PASSWORD){
document.getElementById("loginBox").style.display="none";
document.getElementById("mainContent").style.display="block";
}else{
alert("Wrong Password");
}

}

const firebaseConfig={
apiKey:"AIzaSyDuT-uXEbATKcPd3Smk1oysNih_lplFCwo",
authDomain:"ramu-kiranam-milk.firebaseapp.com",
projectId:"ramu-kiranam-milk"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();

document.getElementById("entryDate").value=
new Date().toISOString().split("T")[0];

const products=[
{name:"🥛 Thirumala Gold 500ml",price:37},
{name:"🥛 Mulkanoor Gold 500ml",price:35.5},
{name:"🥛 Thirumala & Mulaknoor Plain 500ml",price:27},
{name:"🥛 Mulkanoor Gold 200ml",price:13},
{name:"🥛 Curd 1kg",price:48},
{name:"🥛 Sangam Curd 500gm",price:28},
{name:"🥛 Mukunda Curd 500gm",price:24},
{name:"🥛 Curd 175gm",price:8}
];

const container=document.getElementById("products");

products.forEach(product=>{

const card=document.createElement("div");

card.className="card";

card.innerHTML=`
<strong>${product.name}</strong><br>
Price: ₹${product.price}

<div class="row">
Quantity:
<input type="number" min="0" data-price="${product.price}" placeholder="Qty">

<div class="amount-box">
₹ <span class="itemTotal">0</span>
</div>
</div>
`;

container.appendChild(card);

});


function calculate(){

let total=0;

document.querySelectorAll("#products .card").forEach(card=>{

let input=card.querySelector("input");

let qty=Number(input.value)||0;

let price=Number(input.dataset.price);

let amount=qty*price;

card.querySelector(".itemTotal").innerText=amount;

total+=amount;

});

let oilMinus=Number(document.getElementById("oilMinus").value)||0;
let riceMinus=Number(document.getElementById("riceMinus").value)||0;

total=total-oilMinus-riceMinus;

if(total<0) total=0;

document.getElementById("grandTotal").innerText=total;

}

document.addEventListener("input",calculate);


function makePayment(){

let amount=document.getElementById("grandTotal").innerText;

let upiID="mulkasampath@okaxis";

let name="Mulka Sampath";

let note="Milk Bill Payment";

let upiLink=`upi://pay?pa=${upiID}&pn=${name}&am=${amount}&cu=INR&tn=${note}`;

window.location.href=upiLink;

}


function markPaid(){

document.getElementById("paymentPopup").style.display="flex";

}


function closePopup(){

document.getElementById("paymentPopup").style.display="none";

}


function sendBillWhatsApp(){

let date=document.getElementById("entryDate").value;
let oilMinus=document.getElementById("oilMinus").value||0;
let riceMinus=document.getElementById("riceMinus").value||0;
let totalAmount=document.getElementById("grandTotal").innerText;

let items="";
let totalPackets=0;

document.querySelectorAll("#products .card").forEach(card=>{

let name=card.querySelector("strong").innerText;
let qty=card.querySelector("input").value;

if(qty && qty>0){

items+=name+" × "+qty+"\n";
totalPackets+=Number(qty);

}

});

let message=
`Milk Bill Payment

Date: ${date}

${items}
Total Milk Packets: ${totalPackets}

Oil Minus: ₹${oilMinus}
Rice Minus: ₹${riceMinus}

Final Amount Paid: ₹${totalAmount}

From: Ramu Kiranam Store`;

let supplierNumber="919849352795";

let whatsappURL=`https://wa.me/${supplierNumber}?text=${encodeURIComponent(message)}`;

window.open(whatsappURL,"_blank");

}

</script>

</body>
</html>
